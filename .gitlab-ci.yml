stages:
  - trigger
  - build
  - test
  - security
  - deploy

variables:
  ADC_URL: "https://adc-orchestrator.example.com"

trigger_adc_webhook:
  stage: trigger
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger" || $EVENT_TYPE == "issue_opened"
  script:
    - echo "Triggering AutoDevOps Commander webhook for an opened issue..."
    - |
      curl -X POST $ADC_URL/webhook/gitlab \
        -H "Content-Type: application/json" \
        -H "x-gitlab-event: Issue Hook" \
        -d '{
          "object_kind": "issue",
          "object_attributes": {
            "action": "open",
            "iid": "'"${ISSUE_IID:-1}"'",
            "title": "'"${ISSUE_TITLE:-Automated Issue}"'",
            "description": "'"${ISSUE_DESC:-Triggered from CI/CD}"'"
          }
        }'

build_job:
  stage: build
  script:
    - echo "Building application..."
    - npm install
    - npm run build

test_job:
  stage: test
  script:
    - echo "Running tests generated by QA Agent..."
    - npm test

security_scan:
  stage: security
  image: python:3.10
  script:
    - echo "Running Python Security Scanner..."
    - python python/security_scanner.py .

deploy_job:
  stage: deploy
  only:
    - main
  script:
    - echo "Deploying to production..."
    - curl -X POST $ADC_URL/api/notify-deploy
